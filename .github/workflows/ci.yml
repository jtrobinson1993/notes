name: CI

on:
  push:
  pull_request:

jobs:
  unit:
    name: Unit + integration (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run Vitest with coverage gates
        run: npm run coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build server + web
        run: npm run build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright
        run: npm run e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  image-boot:
    name: Production image boots
    runs-on: ubuntu-latest
    # Builds the same pruned (--omit=dev) image the release ships and boots it.
    # Catches runtime deps that exist in dev but get pruned from production
    # (unit/e2e jobs run with full node_modules, so they can't see this).
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: notes:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Boot it and probe the app
        run: |
          docker run -d --name notes-ci -e APP_ORIGIN=http://localhost:3000 \
            -p 3000:3000 notes:ci
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/ || true)
            if [ "$code" = "200" ]; then echo "healthy (HTTP $code)"; exit 0; fi
            sleep 1
          done
          echo "::error::server did not serve / within 30s — see logs below"
          docker logs notes-ci
          exit 1
      - name: Tear down
        if: always()
        run: docker rm -f notes-ci || true
