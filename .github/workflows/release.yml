name: Release

# Build a multi-arch image and publish it to GHCR on every version tag, so the
# production box never builds — a release is just `docker compose pull && up -d`.
# Tag a known-good commit: `git tag v0.2.0 && git push --tags`.
on:
  push:
    tags: ['v*.*.*']

jobs:
  image:
    name: Build + push image (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Version tags are tied to package.json: the tag must be exactly
      # `v<root package.json version>`. Guards against tagging a commit whose
      # version wasn't bumped (or a typo'd tag), which would ship a mislabelled
      # image. See the `release` skill for the flow that keeps them in lockstep.
      - name: Verify tag matches package.json version
        run: |
          PKG="v$(node -p "require('./package.json').version")"
          if [ "$PKG" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag $GITHUB_REF_NAME != package.json $PKG — bump package.json or fix the tag"
            exit 1
          fi
          echo "tag $GITHUB_REF_NAME matches package.json $PKG"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
