<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- interactive-widget=resizes-content: when the on-screen keyboard opens on
         Android Chrome, shrink the *layout* viewport (so `100%`/`#app` resize to
         the space above the keyboard) instead of the default `resizes-visual`,
         which leaves the layout viewport full-height — that left a tall blank
         strip below the shell and a scrollable gap on Android. iOS Safari ignores
         this directive, so the visualViewport tracking in lib/viewport.ts remains
         the keyboard-fit path there. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <!-- Theme-color paints the mobile browser / status-bar chrome (and the area
         behind the notch in the installed PWA) to match the app background. A
         single tag whose content the app drives from the *resolved* theme (mode
         × palette), set pre-paint below and kept in sync by lib/theme.ts — a
         media-query pair can't express it, since the chosen mode (light/dark)
         can differ from the OS preference and each palette has its own page
         colour. Initial value is the brand-light page colour. -->
    <meta name="theme-color" content="#fafafa" />
    <!-- Installable PWA: launch chrome-less on Android (mobile-web-app-capable)
         and iOS (apple-*), with an edge-to-edge translucent iOS status bar that
         pairs with viewport-fit=cover + the safe-area insets in style.css. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Accord" />
    <!-- Don't auto-link phone numbers in message text on iOS. -->
    <meta name="format-detection" content="telephone=no" />
    <!-- Scalable transparent "A" mark for modern browsers; PNG fallbacks for
         older browsers and the iOS home-screen icon. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>Accord</title>
    <script>
      // Apply saved theme before first paint to avoid a flash (esp. dark /
      // high-contrast). Mirrors lib/theme.ts; main.ts re-applies on boot.
      (function () {
        try {
          var d = document.documentElement;
          var m = localStorage.getItem('notes:theme');
          var dark = m === 'dark' || (m !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches);
          d.classList.toggle('dark', dark);
          var p = localStorage.getItem('notes:palette');
          var pal = p === 'pastel' || p === 'high-contrast' ? p : 'brand';
          d.dataset.theme = pal;
          // Match the status-bar / notch chrome to the page colour before paint
          // (each palette's zinc-50 light / zinc-950 dark page background); the
          // running app re-reads the computed colour in lib/theme.ts.
          var bg = { brand: ['#fafafa', '#09090b'], pastel: ['#eff1f5', '#181926'], 'high-contrast': ['#ffffff', '#000000'] };
          var tc = document.querySelector('meta[name="theme-color"]');
          if (tc) tc.setAttribute('content', bg[pal][dark ? 1 : 0]);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
